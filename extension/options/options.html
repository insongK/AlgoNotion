<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>AlgoNotion 설정</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        margin: 16px;
      }

      h1 {
        font-size: 20px;
        margin-bottom: 12px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
      }

      input[type="text"] {
        width: 100%;
        padding: 6px 8px;
        box-sizing: border-box;
        margin-bottom: 12px;
      }

      button {
        padding: 6px 12px;
        cursor: pointer;
      }

      #status {
        margin-top: 8px;
        font-size: 12px;
        color: #555;
      }
    </style>
  </head>
  <body>
    <h1>AlgoNotion 설정</h1>

    <label for="backend-url">백엔드 Webhook URL</label>
    <input
      id="backend-url"
      type="text"
      placeholder="예: http://localhost:8000/webhook"
    />

    <button id="save-button" type="button">저장</button>

    <div id="status"></div>

    <script src="options.js"></script>
  </body>
</html>
