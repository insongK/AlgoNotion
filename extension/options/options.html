<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>AlgoNotion 설정</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 16px;
        max-width: 720px;
      }

      h1 {
        font-size: 20px;
        margin-bottom: 12px;
      }

      p {
        color: #444;
        line-height: 1.5;
      }

      label {
        display: block;
        margin-top: 16px;
        margin-bottom: 8px;
        font-weight: 600;
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 8px 10px;
        box-sizing: border-box;
      }

      small {
        display: block;
        margin-top: 6px;
        color: #666;
      }

      button {
        margin-top: 16px;
        padding: 8px 14px;
        cursor: pointer;
      }

      #status {
        margin-top: 8px;
        font-size: 12px;
        color: #555;
      }
    </style>
  </head>
  <body>
    <h1>AlgoNotion 설정</h1>
    <p>OpenAI 비용은 공용 백엔드가 부담하고, Notion 저장은 각자 자신의 Integration과 Database를 사용합니다.</p>

    <label for="backend-url">백엔드 URL</label>
    <input
      id="backend-url"
      type="text"
      placeholder="예: http://43.201.46.22:8000"
    />
    <small>`/webhook` 경로는 확장에서 자동으로 붙습니다.</small>

    <label for="notion-token">Notion Integration Token</label>
    <input
      id="notion-token"
      type="password"
      placeholder="secret_xxx"
    />
    <small>본인 Notion 워크스페이스의 Integration Token을 입력합니다.</small>

    <label for="notion-database-id">Notion Database ID</label>
    <input
      id="notion-database-id"
      type="text"
      placeholder="32자리 Database ID"
    />
    <small>저장 대상 Notion 데이터베이스 ID를 입력합니다.</small>

    <button id="save-button" type="button">저장</button>

    <div id="status"></div>

    <script src="options.js"></script>
  </body>
</html>
